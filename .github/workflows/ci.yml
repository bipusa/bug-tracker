name: CI # Gives this workflow a name. You will see "CI" in the GitHub Actions tab.

on: # Defines when this workflow should start.
  push: # Run automatically whenever code is pushed.
    branches: # Limit the push trigger to specific branches.
      - main # Only run automatically when the push goes to the main branch.
  pull_request: # Also run when a pull request targets main.
    branches:
      - main
  workflow_dispatch: # Also allow manual triggering from the GitHub Actions UI.

jobs: # A workflow contains one or more jobs.

  unit-tests-backend: # Backend unit test job.
    runs-on: ubuntu-latest # Use GitHub's latest Ubuntu runner machine.
    outputs:
      coverage: ${{ steps.test-backend.outputs.report }}

    steps:
      - uses: actions/checkout@v4 # Downloads your repository code into the runner so the workflow can access your files.

      - name: Set up Go # Installs and configures Go on the runner.
        uses: actions/setup-go@v4
        with:
          go-version: "1.21" # Tells GitHub Actions to use Go version 1.21.
          cache-dependency-path: bugtracker-backend/go.sum # Uses go.sum to cache dependencies and speed up future runs.

      - name: Install go-junit-report # Installs a tool that converts Go test output into JUnit XML.
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Execute Backend Unit Tests # Run backend unit tests and create coverage + junit report.
        id: test-backend
        working-directory: ./bugtracker-backend
        shell: bash
        run: |
          go test -json -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out > coverage.txt

          echo "## Go Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat coverage.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat coverage.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          go test -v ./... 2>&1 | $(go env GOPATH)/bin/go-junit-report > test-results.xml

      - name: Publish backend test results # Publish junit XML test results to GitHub Actions UI.
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend Unit Tests report
          path: bugtracker-backend/test-results.xml
          reporter: java-junit

  unit-tests-frontend: # Frontend unit test job.
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.test-frontend.outputs.report }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Node 20 is a safer default for most frontend projects.
          cache: "npm"
          cache-dependency-path: bugtracker-frontend/package-lock.json

      - name: Execute Frontend Unit Tests
        id: test-frontend
        working-directory: ./bugtracker-frontend
        run: |
          npm ci
          npm test | tee full_output.txt

          echo "## Frontend Test Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat full_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat full_output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  create-coverage-comment: # Add backend coverage as a PR comment.
    if: github.event_name == 'pull_request'
    needs: [unit-tests-backend, unit-tests-frontend]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Create backend coverage comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Backend Test Coverage Report
            ```
            ${{ needs.unit-tests-backend.outputs.coverage }}
            ```
      - name: Create Frontend coverage comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Frontend Test Coverage Report
            ```
            ${{ needs.unit-tests-frontend.outputs.coverage }}
            ```
    api-tests:
      - needs: [unit-tests-backend, unit-tests-frontend]
        runs-on: ubuntu-latest

        steps:
          - name: Checkout repository
            uses: actions/checkout@v4

          - name: Launch Application
            runs: |
              docker compose up --build -default
              npx wait-port http://localhost:8080/api/health -t 30000
              